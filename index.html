<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olive Studios — Fine Art Editions</title>
  <meta name="description" content="Museum-grade limited edition prints by Egypt's finest photographers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #1b1916;
      color: #f0ead8;
      font-family: 'Jost', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Arabic font overrides — Amiri mirrors Cormorant Garamond, Cairo mirrors Jost */
    [dir="rtl"] { font-family: 'Cairo', sans-serif; }
    [dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] h3, [dir="rtl"] em { font-family: 'Amiri', serif !important; letter-spacing: 0 !important; }
    [dir="rtl"] p, [dir="rtl"] span, [dir="rtl"] button, [dir="rtl"] a, [dir="rtl"] input, [dir="rtl"] textarea, [dir="rtl"] select { font-family: 'Cairo', sans-serif !important; letter-spacing: 0 !important; }
    /* Amiri renders optically larger than Cormorant — scale down to match */
    [dir="rtl"] h1 { font-size: calc(1em * 0.78) !important; line-height: 1.15 !important; }
    [dir="rtl"] h2 { font-size: calc(1em * 0.82) !important; }
    [dir="rtl"] h3 { font-size: calc(1em * 0.85) !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1b1916; }
    ::-webkit-scrollbar-thumb { background: rgba(196,163,85,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(196,163,85,0.5); }
    ::selection { background: rgba(196,163,85,0.25); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .desktop-nav { display: flex !important; }
    .mobile-menu-btn { display: none !important; }
    @media (max-width: 1180px) {
      .logo-wordmark { display: none !important; }
    }
    @media (max-width: 900px) {
      .desktop-nav { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: rgba(240,234,216,0.7);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.25,0,0,1);
    }
    .nav-link:hover::after { transform: scaleX(1); }

    input::placeholder, textarea::placeholder { color: rgba(240,234,216,0.3); }
    input, textarea, select { color-scheme: dark; }

    @media (max-width: 520px) {
      .concierge-label { display: none !important; }
      .concierge-fab { padding: 10px !important; }
    }

    #tweaks-panel {
      position: fixed; bottom: 24px; right: 24px; z-index: 500;
      background: #1e1c18; border: 1px solid rgba(240,234,216,0.12);
      padding: 20px 24px; min-width: 240px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      display: none; flex-direction: column; gap: 16px;
    }
    #tweaks-panel.open { display: flex; }
    #tweaks-panel label {
      font-family: 'Jost', sans-serif; font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(240,234,216,0.4);
    }
    #tweaks-panel input[type="color"] { width: 100%; height: 28px; border: none; background: none; cursor: pointer; padding: 0; }
    #tweaks-panel select {
      width: 100%; background: rgba(240,234,216,0.05); border: 1px solid rgba(240,234,216,0.12);
      color: #f0ead8; font-family: 'Jost', sans-serif; font-size: 12px; padding: 6px 8px; outline: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="src/data.js?v=6"></script>
  <script src="src/translations.js?v=6"></script>
  <script type="text/babel" src="src/pages/PageHelpers.jsx?v=6"></script>
  <script type="text/babel" src="src/components/ProductCard.jsx?v=6"></script>
  <script type="text/babel" src="src/components/Footer.jsx?v=6"></script>
  <script type="text/babel" src="src/components/Header.jsx?v=6"></script>
  <script type="text/babel" src="src/components/CartDrawer.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Home.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Collection.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/About.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Artists.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/ArtworkDetail.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Contact.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/FAQ.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Bespoke.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Corporate.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Collectors.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/PrintQuality.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Shipping.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Editions.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Care.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Privacy.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Terms.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Studio.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Cart.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/Checkout.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/ThankYou.jsx?v=6"></script>
  <script type="text/babel" src="src/pages/HowItWorks.jsx?v=6"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#c4a355",
      "bgColor": "#1b1916",
      "headingFont": "Cormorant Garamond"
    }/*EDITMODE-END*/;

    function App() {
      const [page, setPage] = React.useState(() => localStorage.getItem('olive_page') || 'home');
      const [params, setParams] = React.useState(() => { try { return JSON.parse(localStorage.getItem('olive_params') || '{}'); } catch { return {}; } });
      const [cart, setCart] = React.useState(() => { try { return JSON.parse(localStorage.getItem('olive_cart') || '[]'); } catch { return []; } });
      const [region, setRegion] = React.useState(() => localStorage.getItem('olive_region') || 'egypt');
      const [currency, setCurrency] = React.useState(() => localStorage.getItem('olive_currency') || 'EGP');
      const [lastOrder, setLastOrder] = React.useState(() => { try { return JSON.parse(localStorage.getItem('olive_last_order') || 'null'); } catch { return null; } });
      const [cartOpen, setCartOpen] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [tweaksPanelOpen, setTweaksPanelOpen] = React.useState(false);
      const [lang, setLang] = React.useState('EN');

      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksPanelOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksPanelOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      // Apply lang direction
      React.useEffect(() => {
        document.documentElement.dir = lang === 'AR' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang === 'AR' ? 'ar' : 'en';
      }, [lang]);

      const updateTweak = (key, val) => {
        const next = { ...tweaks, [key]: val };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };

      const navigate = (newPage, newParams = {}) => {
        setPage(newPage);
        setParams(newParams);
        localStorage.setItem('olive_page', newPage);
        localStorage.setItem('olive_params', JSON.stringify(newParams));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const addToCart = (item) => {
        setCart(c => c.find(i => i.id === item.id) ? c : [...c, item]);
        setCartOpen(true);
      };
      const removeFromCart = (i) => setCart(c => c.filter((_, idx) => idx !== i));
      const updateCartItem = (index, patch) => setCart(c => c.map((it, i) => {
        if (i !== index) return it;
        const next = { ...it, ...patch };
        const art = window.ARTWORKS.find(a => a.id === next.artworkId);
        if (art) next.price = window.priceFor(art, next.size, next.framed);
        if (!next.framed) next.frameColor = null;
        return next;
      }));
      const placeOrder = (details) => {
        const order = { ...details, confirmation: 'OS-' + Date.now().toString().slice(-6), date: new Date().toISOString() };
        setLastOrder(order);
        localStorage.setItem('olive_last_order', JSON.stringify(order));
        setCart([]);
        navigate('thankyou');
      };

      React.useEffect(() => { localStorage.setItem('olive_cart', JSON.stringify(cart)); }, [cart]);
      React.useEffect(() => { localStorage.setItem('olive_region', region); }, [region]);
      React.useEffect(() => { localStorage.setItem('olive_currency', currency); }, [currency]);

      const pageProps = { navigate, addToCart, tweaks: { bg: tweaks.bgColor }, lang, currency };

      const pages = {
        home: <HomePage {...pageProps} />,
        collection: <CollectionPage {...pageProps} params={params} />,
        about: <AboutPage {...pageProps} />,
        artists: <ArtistsPage {...pageProps} />,
        artist: <ArtistDetailPage {...pageProps} params={params} />,
        artwork: <ArtworkDetailPage {...pageProps} params={params} />,
        contact: <ContactPage {...pageProps} />,
        faq: <FAQPage {...pageProps} />,
        bespoke: <BespokePage {...pageProps} />,
        corporate: <CorporatePage {...pageProps} />,
        collectors: <CollectorsPage {...pageProps} />,
        printquality: <PrintQualityPage {...pageProps} />,
        shipping: <ShippingPage {...pageProps} />,
        editions: <EditionsPage {...pageProps} />,
        care: <CarePage {...pageProps} />,
        privacy: <PrivacyPage {...pageProps} />,
        terms: <TermsPage {...pageProps} />,
        'star-of-month': <StarOfMonthPage {...pageProps} />,
        'behind-scenes': <BehindScenesPage {...pageProps} />,
        guides: <GuidesPage {...pageProps} />,
        reviews: <CollectionPage {...pageProps} />,
        cart: <CartPage {...pageProps} cart={cart} updateCartItem={updateCartItem} removeFromCart={removeFromCart} region={region} setRegion={setRegion} />,
        checkout: <CheckoutPage {...pageProps} cart={cart} region={region} setRegion={setRegion} placeOrder={placeOrder} />,
        thankyou: <ThankYouPage {...pageProps} order={lastOrder} />,
        howitworks: <HowItWorksPage {...pageProps} />
      };

      return (
        <div style={{ background: tweaks.bgColor, minHeight: '100vh' }}>
          <Header
            navigate={navigate}
            cartCount={cart.length}
            onCartOpen={() => setCartOpen(true)}
            lang={lang}
            setLang={setLang}
            currency={currency}
            setCurrency={setCurrency}
          />
          <main>{pages[page] || pages.home}</main>
          <Footer navigate={navigate} lang={lang} />

          {cartOpen && (
            <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} navigate={navigate} lang={lang} currency={currency} />
          )}

          {/* Persistent concierge — refined, tasteful, brand palette */}
          <a
            href={`https://wa.me/${window.CURATOR_WA}`}
            target="_blank"
            rel="noopener noreferrer"
            className="concierge-fab"
            style={{
              position: 'fixed', bottom: '24px', right: '24px', zIndex: 150,
              display: 'flex', alignItems: 'center', gap: '11px',
              background: 'rgba(30,28,24,0.92)',
              backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
              border: '1px solid rgba(196,163,85,0.35)',
              padding: '10px 18px 10px 11px', borderRadius: '40px',
              boxShadow: '0 10px 34px rgba(0,0,0,0.42)',
              textDecoration: 'none',
              transition: 'transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease',
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.borderColor = 'rgba(196,163,85,0.7)'; e.currentTarget.style.boxShadow = '0 14px 40px rgba(0,0,0,0.5)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.borderColor = 'rgba(196,163,85,0.35)'; e.currentTarget.style.boxShadow = '0 10px 34px rgba(0,0,0,0.42)'; }}
          >
            <span style={{ width: 32, height: 32, borderRadius: '50%', background: '#c4a355', color: '#1b1916', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
            <span className="concierge-label" style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.2 }}>
              <span style={{ fontFamily: "'Jost', sans-serif", fontSize: '12.5px', letterSpacing: '0.02em', color: '#f0ead8' }}>{lang === 'AR' ? 'تحدّث مع أمين المجموعة' : 'Chat with a curator'}</span>
              <span style={{ fontFamily: "'Jost', sans-serif", fontSize: '9px', letterSpacing: lang === 'AR' ? 0 : '0.14em', textTransform: lang === 'AR' ? 'none' : 'uppercase', color: 'rgba(196,163,85,0.8)' }}>{lang === 'AR' ? '١٠ص–٨م بتوقيت القاهرة' : '10am–8pm Cairo'}</span>
            </span>
          </a>

          <div id="tweaks-panel" className={tweaksPanelOpen ? 'open' : ''}>
            <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '16px', color: '#f0ead8', borderBottom: '1px solid rgba(240,234,216,0.1)', paddingBottom: '12px' }}>Tweaks</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              <label>Accent Color</label>
              <input type="color" value={tweaks.accentColor} onChange={e => updateTweak('accentColor', e.target.value)} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              <label>Background</label>
              <select value={tweaks.bgColor} onChange={e => updateTweak('bgColor', e.target.value)}>
                <option value="#1b1916">Warm Charcoal (default)</option>
                <option value="#141414">True Black</option>
                <option value="#1a1e1b">Cool Forest</option>
                <option value="#1e1a1a">Deep Burgundy</option>
              </select>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
