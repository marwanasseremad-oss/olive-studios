<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olive Studios — Fine Art Editions</title>
  <meta name="description" content="Museum-grade limited edition prints by Egypt's finest photographers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #1b1916;
      color: #f0ead8;
      font-family: 'Jost', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Arabic font overrides — Amiri mirrors Cormorant Garamond, Cairo mirrors Jost */
    [dir="rtl"] { font-family: 'Cairo', sans-serif; }
    [dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] h3, [dir="rtl"] em { font-family: 'Amiri', serif !important; letter-spacing: 0 !important; }
    [dir="rtl"] p, [dir="rtl"] span, [dir="rtl"] button, [dir="rtl"] a, [dir="rtl"] input, [dir="rtl"] textarea, [dir="rtl"] select { font-family: 'Cairo', sans-serif !important; letter-spacing: 0 !important; }
    /* Amiri renders optically larger than Cormorant — scale down to match */
    [dir="rtl"] h1 { font-size: calc(1em * 0.78) !important; line-height: 1.15 !important; }
    [dir="rtl"] h2 { font-size: calc(1em * 0.82) !important; }
    [dir="rtl"] h3 { font-size: calc(1em * 0.85) !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1b1916; }
    ::-webkit-scrollbar-thumb { background: rgba(196,163,85,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(196,163,85,0.5); }
    ::selection { background: rgba(196,163,85,0.25); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .desktop-nav { display: flex !important; }
    .mobile-menu-btn { display: none !important; }
    @media (max-width: 900px) {
      .desktop-nav { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: rgba(240,234,216,0.7);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.25,0,0,1);
    }
    .nav-link:hover::after { transform: scaleX(1); }

    input::placeholder, textarea::placeholder { color: rgba(240,234,216,0.3); }
    input, textarea, select { color-scheme: dark; }

    #tweaks-panel {
      position: fixed; bottom: 24px; left: 24px; z-index: 500;
      background: #1e1c18; border: 1px solid rgba(240,234,216,0.12);
      padding: 20px 24px; min-width: 240px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      display: none; flex-direction: column; gap: 16px;
    }
    #tweaks-panel.open { display: flex; }
    #tweaks-panel label {
      font-family: 'Jost', sans-serif; font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(240,234,216,0.4);
    }
    #tweaks-panel input[type="color"] { width: 100%; height: 28px; border: none; background: none; cursor: pointer; padding: 0; }
    #tweaks-panel select {
      width: 100%; background: rgba(240,234,216,0.05); border: 1px solid rgba(240,234,216,0.12);
      color: #f0ead8; font-family: 'Jost', sans-serif; font-size: 12px; padding: 6px 8px; outline: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="src/data.js?v=3"></script>
  <script src="src/translations.js?v=3"></script>
  <script type="text/babel" src="src/pages/PageHelpers.jsx?v=3"></script>
  <script type="text/babel" src="src/components/ProductCard.jsx?v=3"></script>
  <script type="text/babel" src="src/components/Footer.jsx?v=3"></script>
  <script type="text/babel" src="src/components/Header.jsx?v=3"></script>
  <script type="text/babel" src="src/components/CartDrawer.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Home.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Collection.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/About.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Artists.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/ArtworkDetail.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Contact.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/FAQ.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Bespoke.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Corporate.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Collectors.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/PrintQuality.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Shipping.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Editions.jsx?v=3"></script>
  <script type="text/babel" src="src/pages/Care.jsx?v=3"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = {
      "accentColor": "#c4a355",
      "bgColor": "#1b1916",
      "headingFont": "Cormorant Garamond"
    };

    function App() {
      const [page, setPage] = React.useState(() => localStorage.getItem('olive_page') || 'home');
      const [params, setParams] = React.useState(() => { try { return JSON.parse(localStorage.getItem('olive_params') || '{}'); } catch { return {}; } });
      const [cart, setCart] = React.useState([]);
      const [cartOpen, setCartOpen] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [tweaksPanelOpen, setTweaksPanelOpen] = React.useState(false);
      const [lang, setLang] = React.useState('EN');

      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksPanelOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksPanelOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      React.useEffect(() => {
        document.documentElement.dir = lang === 'AR' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang === 'AR' ? 'ar' : 'en';
      }, [lang]);

      const updateTweak = (key, val) => {
        const next = { ...tweaks, [key]: val };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };

      const navigate = (newPage, newParams = {}) => {
        setPage(newPage);
        setParams(newParams);
        localStorage.setItem('olive_page', newPage);
        localStorage.setItem('olive_params', JSON.stringify(newParams));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const addToCart = (item) => {
        setCart(c => c.find(i => i.id === item.id) ? c : [...c, item]);
        setCartOpen(true);
      };
      const removeFromCart = (i) => setCart(c => c.filter((_, idx) => idx !== i));

      const pageProps = { navigate, addToCart, tweaks: { bg: tweaks.bgColor }, lang };

      const pages = {
        home: <HomePage {...pageProps} />,
        collection: <CollectionPage {...pageProps} params={params} />,
        about: <AboutPage {...pageProps} />,
        artists: <ArtistsPage {...pageProps} />,
        artist: <ArtistDetailPage {...pageProps} params={params} />,
        artwork: <ArtworkDetailPage {...pageProps} params={params} />,
        contact: <ContactPage {...pageProps} />,
        faq: <FAQPage {...pageProps} />,
        bespoke: <BespokePage {...pageProps} />,
        corporate: <CorporatePage {...pageProps} />,
        collectors: <CollectorsPage {...pageProps} />,
        printquality: <PrintQualityPage {...pageProps} />,
        shipping: <ShippingPage {...pageProps} />,
        editions: <EditionsPage {...pageProps} />,
        care: <CarePage {...pageProps} />,
        reviews: <CollectionPage {...pageProps} />
      };

      return (
        <div style={{ background: tweaks.bgColor, minHeight: '100vh' }}>
          <Header
            navigate={navigate}
            cartCount={cart.length}
            onCartOpen={() => setCartOpen(true)}
            lang={lang}
            setLang={setLang}
          />
          <main>{pages[page] || pages.home}</main>
          <Footer navigate={navigate} lang={lang} />

          {cartOpen && (
            <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} lang={lang} />
          )}

          {/* WhatsApp Floating Button */}
          <a
            href="https://api.whatsapp.com/send?phone=201001161776"
            target="_blank"
            rel="noopener noreferrer"
            style={{
              position: 'fixed', bottom: '28px', right: '28px', zIndex: 300,
              display: 'flex', alignItems: 'center', gap: '10px',
              background: '#25D366', color: '#fff',
              padding: '12px 20px 12px 16px',
              borderRadius: '50px',
              boxShadow: '0 4px 24px rgba(37,211,102,0.35)',
              fontFamily: "'Jost', sans-serif", fontSize: '12px',
              letterSpacing: '0.08em', textTransform: 'uppercase',
              textDecoration: 'none', fontWeight: 500,
              transition: 'transform 0.2s ease, box-shadow 0.2s ease',
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 32px rgba(37,211,102,0.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 4px 24px rgba(37,211,102,0.35)'; }}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            {lang === 'AR' ? 'واتساب' : 'WhatsApp Concierge'}
          </a>

          <div id="tweaks-panel" className={tweaksPanelOpen ? 'open' : ''}>
            <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '16px', color: '#f0ead8', borderBottom: '1px solid rgba(240,234,216,0.1)', paddingBottom: '12px' }}>Tweaks</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              <label>Accent Color</label>
              <input type="color" value={tweaks.accentColor} onChange={e => updateTweak('accentColor', e.target.value)} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              <label>Background</label>
              <select value={tweaks.bgColor} onChange={e => updateTweak('bgColor', e.target.value)}>
                <option value="#1b1916">Warm Charcoal (default)</option>
                <option value="#141414">True Black</option>
                <option value="#1a1e1b">Cool Forest</option>
                <option value="#1e1a1a">Deep Burgundy</option>
              </select>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
